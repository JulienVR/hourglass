<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Disc — Hourglass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/hourglass/pictures/Logo-White-Foxes.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff8f0;
        font-family: 'Fredoka', system-ui, sans-serif;
        color: #1a1a2e;
        overflow: hidden;
      }

      .wrap {
        width: min(100%, 820px);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      h1 {
        font-size: clamp(1.1rem, 3vw, 1.4rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #5c5c7a;
      }

      .game-shell {
        position: relative;
        width: 100%;
        max-width: 800px;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(26, 26, 46, 0.12);
        border: 3px solid #1a1a2e;
        background: #87ceeb;
        cursor: pointer;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 2 / 1;
      }

      .hint {
        font-size: 0.85rem;
        color: #5c5c7a;
        text-align: center;
        line-height: 1.5;
      }

      .hint kbd {
        display: inline-block;
        padding: 0.1rem 0.45rem;
        border-radius: 6px;
        background: #fff;
        border: 1px solid #ddd;
        font: inherit;
        font-size: 0.8rem;
      }

      .back {
        margin-top: 0.25rem;
        font-size: 0.85rem;
        color: #e63946;
        text-decoration: none;
        font-weight: 500;
      }

      .back:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>🥏 Secret Disc Run</h1>
      <div class="game-shell" id="shell">
        <canvas id="game" width="800" height="400" aria-label="Flying disc game"></canvas>
      </div>
      <p class="hint"><kbd>Space</kbd> or tap to flap · dodge the trees</p>
      <a class="back" href="/hourglass/">← Back to Hourglass</a>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const shell = document.getElementById('shell');
      const ctx = canvas.getContext('2d');

      const W = canvas.width;
      const H = canvas.height;
      const GROUND_Y = H - 48;
      const GRAVITY = 0.42;
      const FLAP = -7.2;
      const SCROLL = 4.2;
      const DISC_R = 18;

      const state = {
        mode: 'idle',
        score: 0,
        hi: Number(localStorage.getItem('hourglass-disc-hi') || 0),
        frame: 0,
        disc: { x: 120, y: H / 2, vy: 0, tilt: 0 },
        obstacles: [],
        clouds: [],
        groundOffset: 0,
      };

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function resetGame() {
        state.mode = 'playing';
        state.score = 0;
        state.frame = 0;
        state.disc = { x: 120, y: H / 2, vy: 0, tilt: 0 };
        state.obstacles = [];
        state.clouds = Array.from({ length: 5 }, (_, i) => ({
          x: i * 180 + rand(0, 80),
          y: rand(30, 110),
          w: rand(50, 90),
          speed: rand(0.4, 0.9),
        }));
        state.groundOffset = 0;
        spawnObstacle(W + 100);
      }

      function spawnObstacle(x) {
        const kind = Math.random() < 0.55 ? 'gap' : 'ground';

        if (kind === 'gap') {
          const minGap = DISC_R * 3.6;
          const gap = rand(minGap, 148);
          const topMin = 40;
          const topMax = GROUND_Y - gap - DISC_R * 1.6;
          if (topMax < topMin) {
            state.obstacles.push({
              kind: 'ground',
              x,
              w: rand(28, 42),
              h: rand(34, 58),
              passed: false,
            });
            return;
          }
          state.obstacles.push({ kind, x, gap, topH: rand(topMin, topMax), passed: false, w: 52 });
        } else {
          state.obstacles.push({
            kind,
            x,
            w: rand(28, 42),
            h: rand(34, 58),
            passed: false,
          });
        }
      }

      function flap() {
        if (state.mode === 'idle' || state.mode === 'dead') {
          resetGame();
          return;
        }
        if (state.mode === 'playing') {
          state.disc.vy = FLAP;
        }
      }

      function circleRectHit(cx, cy, r, rx, ry, rw, rh) {
        if (rw <= 0 || rh <= 0) return false;
        const nearestX = Math.max(rx, Math.min(cx, rx + rw));
        const nearestY = Math.max(ry, Math.min(cy, ry + rh));
        const dx = cx - nearestX;
        const dy = cy - nearestY;
        return dx * dx + dy * dy < r * r;
      }

      function treeHitboxes(x, y, w, h) {
        return [
          { x: x + w * 0.35, y: y + h * 0.45, w: w * 0.3, h: h * 0.55 },
          { x: x + w * 0.18, y: y + h * 0.05, w: w * 0.64, h: h * 0.5 },
        ];
      }

      function hitsTree(d, x, y, w, h) {
        const hitR = DISC_R * 0.78;
        return treeHitboxes(x, y, w, h).some(box =>
          circleRectHit(d.x, d.y, hitR, box.x, box.y, box.w, box.h)
        );
      }

      function update() {
        if (state.mode !== 'playing') return;

        state.frame += 1;
        state.groundOffset = (state.groundOffset + SCROLL) % 24;

        const d = state.disc;
        d.vy += GRAVITY;
        d.y += d.vy;
        d.tilt = Math.max(-0.5, Math.min(0.8, d.vy * 0.06));

        if (d.y + DISC_R * 0.85 >= GROUND_Y) {
          die();
          return;
        }
        if (d.y - DISC_R <= 0) {
          d.y = DISC_R;
          d.vy = 0;
        }

        for (const o of state.obstacles) {
          o.x -= SCROLL;

          if (o.kind === 'gap') {
            const bottomH = GROUND_Y - (o.topH + o.gap);
            if (hitsTree(d, o.x, 0, o.w, o.topH) ||
                hitsTree(d, o.x, o.topH + o.gap, o.w, bottomH)) {
              die();
              return;
            }
          } else if (hitsTree(d, o.x, GROUND_Y - o.h, o.w, o.h)) {
            die();
            return;
          }

          if (!o.passed && o.x + o.w < d.x) {
            o.passed = true;
            state.score += 1;
          }
        }

        state.obstacles = state.obstacles.filter(o => o.x + o.w > -20);
        const last = state.obstacles[state.obstacles.length - 1];
        if (!last || last.x < W - rand(180, 260)) {
          spawnObstacle(W + rand(10, 80));
        }

        for (const c of state.clouds) {
          c.x -= c.speed;
          if (c.x + c.w < -20) {
            c.x = W + rand(20, 120);
            c.y = rand(30, 110);
          }
        }
      }

      function die() {
        state.mode = 'dead';
        if (state.score > state.hi) {
          state.hi = state.score;
          localStorage.setItem('hourglass-disc-hi', String(state.hi));
        }
      }

      function drawCloud(x, y, w) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath();
        ctx.ellipse(x, y, w * 0.35, w * 0.18, 0, 0, Math.PI * 2);
        ctx.ellipse(x + w * 0.25, y - w * 0.05, w * 0.28, w * 0.16, 0, 0, Math.PI * 2);
        ctx.ellipse(x + w * 0.5, y, w * 0.32, w * 0.17, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawTree(x, y, w, h) {
        ctx.fillStyle = '#6b4f2a';
        ctx.fillRect(x + w * 0.35, y + h * 0.45, w * 0.3, h * 0.55);
        ctx.fillStyle = '#2d8a4e';
        ctx.beginPath();
        ctx.moveTo(x, y + h * 0.55);
        ctx.lineTo(x + w / 2, y);
        ctx.lineTo(x + w, y + h * 0.55);
        ctx.closePath();
        ctx.fill();
      }

      function drawDisc(x, y, tilt) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tilt);
        ctx.fillStyle = '#ffd166';
        ctx.beginPath();
        ctx.ellipse(0, 0, DISC_R + 2, DISC_R * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#e63946';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath();
        ctx.ellipse(-4, -3, 7, 3, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawGround() {
        ctx.fillStyle = '#ded895';
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        ctx.fillStyle = '#c9c07a';
        for (let x = -24; x < W + 24; x += 24) {
          ctx.fillRect(x - state.groundOffset, GROUND_Y + 10, 12, 4);
        }
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(W, GROUND_Y);
        ctx.stroke();
      }

      function drawScore() {
        ctx.fillStyle = '#1a1a2e';
        ctx.font = '700 28px Fredoka, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(String(state.score).padStart(3, '0'), W - 20, 42);
        ctx.font = '500 14px Fredoka, sans-serif';
        ctx.fillStyle = '#5c5c7a';
        ctx.fillText(`HI ${String(state.hi).padStart(3, '0')}`, W - 20, 62);
      }

      function drawOverlay(title, sub) {
        ctx.fillStyle = 'rgba(26, 26, 46, 0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.font = '700 34px Fredoka, sans-serif';
        ctx.fillText(title, W / 2, H / 2 - 12);
        ctx.font = '500 18px Fredoka, sans-serif';
        ctx.fillStyle = '#ffd166';
        ctx.fillText(sub, W / 2, H / 2 + 24);
      }

      function render() {
        ctx.clearRect(0, 0, W, H);

        const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
        sky.addColorStop(0, '#7ec8e3');
        sky.addColorStop(1, '#cfefff');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, GROUND_Y);

        for (const c of state.clouds) drawCloud(c.x, c.y, c.w);

        for (const o of state.obstacles) {
          if (o.kind === 'gap') {
            drawTree(o.x, 0, o.w, o.topH);
            drawTree(o.x, o.topH + o.gap, o.w, GROUND_Y - (o.topH + o.gap));
          } else {
            drawTree(o.x, GROUND_Y - o.h, o.w, o.h);
          }
        }

        drawGround();
        drawDisc(state.disc.x, state.disc.y, state.disc.tilt);
        drawScore();

        if (state.mode === 'idle') {
          drawOverlay('Flappy Disc', 'Space / tap to start');
        } else if (state.mode === 'dead') {
          drawOverlay('Layout!', 'Space / tap to retry');
        }
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
          e.preventDefault();
          flap();
        }
      });

      shell.addEventListener('pointerdown', e => {
        e.preventDefault();
        flap();
      });

      loop();
    </script>
  </body>
</html>
